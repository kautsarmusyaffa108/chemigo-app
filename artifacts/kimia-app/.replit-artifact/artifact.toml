kind = "web"
previewPath = "/"
title = "KimiaKu - Belajar Kimia"
version = "1.0.0"
id = "artifacts/kimia-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26004
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kimia-app run dev"

[services.env]
PORT = "26004"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kimia-app", "run", "build"]
publicDir = "artifacts/kimia-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
