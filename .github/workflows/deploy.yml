name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Kita naikkan ke versi terbaru

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # Update ke v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        env:
          PORT: 3000
          BASE_PATH: /chemigo-app/
          VITE_BASE_PATH: /chemigo-app/
        run: pnpm --filter @workspace/kimia-app exec vite build --base=/chemigo-app/

      - name: Fix SPA Router
        run: |
          # Mencari di mana folder dist berada dan menyimpan jalurnya
          DIST_PATH=$(find . -name dist -type d -not -path "*/node_modules/*" | head -n 1)
          echo "Folder dist ditemukan di: $DIST_PATH"
          if [ -n "$DIST_PATH" ]; then
            cp "$DIST_PATH/index.html" "$DIST_PATH/404.html"
            # Simpan path ke file lingkungan agar bisa dipakai step berikutnya
            echo "FINAL_DIST=$DIST_PATH" >> $GITHUB_ENV
          else
            echo "Folder dist tetap tidak ditemukan!" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_DIST }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
