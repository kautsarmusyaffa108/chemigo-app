name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # Sesuai dengan branch di screenshot kamu
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        # Tambahan --base supaya file CSS & JS nggak error 404
        run: pnpm --filter @workspace/kimia-app exec vite build --base=/chemigo-app/

      - name: Fix SPA Router (Wouter)
        # Biar kalau di-refresh halamannya nggak blank/404
        run: cp artifacts/kimia-app/dist/index.html artifacts/kimia-app/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/kimia-app/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
