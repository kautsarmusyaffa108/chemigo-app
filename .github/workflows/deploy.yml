name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        env:
          PORT: 3000
          BASE_PATH: /chemigo-app/
          VITE_BASE_PATH: /chemigo-app/
        # Kita paksa build dan langsung cek isinya ada di mana
        run: |
          pnpm --filter @workspace/kimia-app exec vite build --base=/chemigo-app/
          ls -R # Ini buat kita ngintip semua folder kalau gagal lagi

      - name: Fix SPA Router
        run: |
          # Cari file index.html di manapun dia berada
          TARGET_FILE=$(find . -name index.html -not -path "*/node_modules/*" | grep "/dist/" | head -n 1)
          TARGET_DIR=$(dirname "$TARGET_FILE")
          echo "Folder build ditemukan di: $TARGET_DIR"
          cp "$TARGET_FILE" "$TARGET_DIR/404.html"
          echo "FINAL_PATH=$TARGET_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_PATH }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
